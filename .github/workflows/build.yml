name: Build

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/tag to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Enable sparse checkout for faster cloning if needed
  RUST_BACKTRACE: 1

jobs:
  # =============================================================================
  # Build macOS (arm64 + x86_64) - native build on macOS runners
  # =============================================================================
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache cargo build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git
            src-tauri/target
          key: cargo-build-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-${{ matrix.target }}-

      - name: Build
        run: |
          cd src-tauri
          cargo build --release --target ${{ matrix.target }}

      - name: Create macOS app bundle
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        env:
          VERSION: ${GITHUB_REF#refs/tags/v}
        run: |
          mkdir -p bundle/macos
          APP_NAME="SubtitleBurner"
          mkdir -p "bundle/macos/${APP_NAME}.app/Contents/MacOS"
          mkdir -p "bundle/macos/${APP_NAME}.app/Contents/Resources"
          
          cp "src-tauri/target/${{ matrix.target }}/release/subtitle-burner" "bundle/macos/${APP_NAME}.app/Contents/MacOS/"
          
          if [ -f "src-tauri/icons/icon.icns" ]; then
            cp "src-tauri/icons/icon.icns" "bundle/macos/${APP_NAME}.app/Contents/Resources/"
          fi
          
          VERSION_NUMBER=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION_NUMBER" = "$GITHUB_REF" ]; then
            VERSION_NUMBER="0.0.0"
          fi
          
          cat > "bundle/macos/${APP_NAME}.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>subtitle-burner</string>
            <key>CFBundleIdentifier</key>
            <string>com.subtitleburner.desktop</string>
            <key>CFBundleName</key>
            <string>SubtitleBurner</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION_NUMBER}</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_RUN_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          
          cd bundle/macos
          tar -czf "../../../SubtitleBurner_macos_${{ matrix.target }}.tar.gz" "${APP_NAME}.app"
          
          hdiutil create -volname SubtitleBurner -srcfolder "${APP_NAME}.app" -ov -format UDZO -fs HFS+ "../../../SubtitleBurner_macos_${{ matrix.target }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-burner-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/subtitle-burner
          retention-days: 5

      - name: Upload macOS bundle
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: SubtitleBurner_macos_${{ matrix.target }}
          path: |
            SubtitleBurner_macos_${{ matrix.target }}.tar.gz
            SubtitleBurner_macos_${{ matrix.target }}.dmg
          retention-days: 5

  # =============================================================================
  # Build Windows (x86_64) - cross-compile from macOS
  # =============================================================================
  build-windows:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw-w64
        run: brew install mingw-w64

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache cargo build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git
            src-tauri/target
          key: cargo-build-${{ runner.os }}-x86_64-pc-windows-gnu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-x86_64-pc-windows-gnu-

      - name: Build
        run: |
          cd src-tauri
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-burner-x86_64-pc-windows-gnu
          path: src-tauri/target/x86_64-pc-windows-gnu/release/subtitle-burner.exe
          retention-days: 5

  # =============================================================================
  # Build Linux (x86_64) - for completeness
  # =============================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache cargo build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git
            src-tauri/target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-

      - name: Build
        run: |
          cd src-tauri
          cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-burner-x86_64-unknown-linux-gnu
          path: src-tauri/target/release/subtitle-burner
          retention-days: 5

  # =============================================================================
  # Create GitHub Release (only on tags)
  # =============================================================================
  release:
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/binaries
          pattern: subtitle-burner-*

      - name: Download macOS bundles
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/download-artifact@v4
        with:
          path: artifacts/bundles
          pattern: SubtitleBurner_macos_*

      - name: Debug - List downloaded artifacts
        run: |
          echo "=== Binaries ==="
          ls -la artifacts/binaries/ || echo "No binaries directory"
          find artifacts/binaries/ -type f 2>/dev/null || echo "No files in binaries"
          echo "=== Bundles ==="
          ls -la artifacts/bundles/ || echo "No bundles directory"
          find artifacts/bundles/ -type f 2>/dev/null || echo "No files in bundles"

      - name: Prepare release assets
        run: |
          cd artifacts/binaries
          mv subtitle-burner-aarch64-apple-darwin/subtitle-burner ../SubtitleBurner_macos_arm64_bin
          mv subtitle-burner-x86_64-apple-darwin/subtitle-burner ../SubtitleBurner_macos_x86_64_bin
          mv subtitle-burner-x86_64-pc-windows-gnu/subtitle-burner.exe ../SubtitleBurner_windows_x86_64.exe
          mv subtitle-burner-x86_64-unknown-linux-gnu/subtitle-burner ../SubtitleBurner_linux_x86_64
          rm -rf subtitle-burner-*/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/binaries/SubtitleBurner_*
            artifacts/bundles/SubtitleBurner_macos_*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Optional: Build verification (runs on all triggers, not just releases)
  # =============================================================================
  verify:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Only run verification on main and release/* branches, not on every tag push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - name: Verify all builds succeeded
        run: |
          echo "All platform builds completed successfully"
          echo "Platforms: macOS (arm64, x86_64), Windows (x86_64), Linux (x86_64)"
